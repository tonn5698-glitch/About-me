<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Report</title>

    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div class="card">

    <img src="./images/PFP.png" alt="Avatar" class="avatar">

    <h1>TikTok Report</h1>

    <div class="username">
        tiktok.com/@p/l/a###_/0/6™
    </div>

    <div class="info">
        <span>Số video đã đăng</span>
        <span>62</span>
    </div>

    <div class="stats">

        <div class="box flop-box">
            <h2>58</h2>
            <p>Flop</p>
        </div>

        <div class="box viral-box">
            <h2>4</h2>
            <p>Viral (&lt;1000 view)</p>
        </div>

    </div>

    <div class="info">
        <span>View Cooldown</span>
        <span>17 days</span>
    </div>

    <div class="footer">
        Ngen-Kim-###
    </div>

</div>

</body>
</html>
