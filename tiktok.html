<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Report</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@300;400;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div class="card">

    <img src="./images/PFP.png" alt="Avatar" class="avatar">

    <h1>TikTok Report</h1>

    <div class="username">
        tiktok.com/@537tn_taifake
    </div>

    <div class="info">
        <span>Số video đã đăng</span>
        <span>63</span>
    </div>

    <div class="stats">

        <div class="box flop-box">
            <h2>59</h2>
            <p>Flop</p>
        </div>

        <div class="box viral-box">
            <h2>4</h2>
            <p>Viral (&lt;1000 view)</p>
        </div>

    </div>

<div class="info">
    <a href="./viewcooldown.html" class="cooldown-link">
        Shadow-Ban
    </a>
    <span id="cooldown">...</span>
</div>

    <div class="footer">
        Ngen-Kim-###
    </div>

</div>

<script>
const startDate = new Date("2026-07-13"); // Ngày bắt đầu
const startDays = 16;                     // Số ngày ban đầu

const today = new Date();

// Chỉ lấy phần ngày, bỏ giờ để tránh lệch
startDate.setHours(0,0,0,0);
today.setHours(0,0,0,0);

const passedDays = Math.floor((today - startDate) / (1000 * 60 * 60 * 24));
const remainDays = Math.max(startDays - passedDays, 0);

document.getElementById("cooldown").textContent = remainDays + " days";
</script>
    
</body>
</html>
